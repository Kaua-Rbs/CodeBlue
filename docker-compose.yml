services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    command: uvicorn codeblue.api.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      CODEBLUE_DATABASE_URL: postgresql+psycopg://codeblue:codeblue@db:5432/codeblue
      CODEBLUE_ENV: development
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: codeblue
      POSTGRES_USER: codeblue
      POSTGRES_PASSWORD: codeblue
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U codeblue -d codeblue"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
